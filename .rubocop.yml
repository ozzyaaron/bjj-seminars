require:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-capybara

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'db/schema.rb'
    - 'db/migrate/*'
    - 'bin/**/*'
    - 'config/boot.rb'
    - 'config/environment.rb'
    - 'config/application.rb'
    - 'config/environments/*'
    - 'config/initializers/*'
    - 'node_modules/**/*'

# Basic setup - user can customize later
Style/Documentation:
  Enabled: false

Metrics/LineLength:
  Max: 120

Layout/LineLength:
  Max: 120
